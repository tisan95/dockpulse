<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DockPulse - {% block title %}{% endblock %}</title>
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: #050816;
            color: #e5e7eb;
        }
        .dp-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }
        .dp-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .dp-logo {
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-size: 14px;
            color: #38bdf8;
        }
        .dp-nav a {
            color: #9ca3af;
            margin-left: 16px;
            text-decoration: none;
            font-size: 14px;
        }
        .dp-nav a:hover {
            color: #e5e7eb;
        }
        .dp-card {
            background: rgba(15,23,42,0.9);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(148,163,184,0.25);
            box-shadow: 0 18px 40px rgba(15,23,42,0.7);
        }
        .dp-title {
            font-size: 20px;
            margin-bottom: 12px;
            color: #e5e7eb;
        }
        .dp-input {
            width: 100%;
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid #4b5563;
            background-color: #020617;
            color: #e5e7eb;
            margin-bottom: 12px;
        }
        .dp-label {
            font-size: 13px;
            color: #9ca3af;
        }
        .dp-button {
            background: linear-gradient(to right, #06b6d4, #3b82f6);
            color: white;
            border: none;
            border-radius: 999px;
            padding: 8px 18px;
            font-size: 14px;
            cursor: pointer;
        }
        .dp-button.secondary {
            background: transparent;
            border: 1px solid #4b5563;
            color: #e5e7eb;
            margin-left: 8px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            padding: 8px 10px;
            border-bottom: 1px solid #1f2937;
        }
        th {
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            color: #9ca3af;
            letter-spacing: 0.08em;
        }
        tr:nth-child(even) td {
            background-color: rgba(15,23,42,0.7);
        }
        .dp-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .dp-badge-green {
            background: rgba(22,163,74,0.15);
            color: #4ade80;
        }
        .dp-badge-red {
            background: rgba(220,38,38,0.15);
            color: #f87171;
        }
        .dp-subtitle {
            font-size: 13px;
            color: #9ca3af;
            margin-bottom: 16px;
        }
    </style>
    {% block head_extra %}{% endblock %}
</head>
<body>
<div class="dp-container">
    <header class="dp-header">
        <div class="dp-logo">DOCKPULSE</div>
        <nav class="dp-nav">
            <a href="{% url 'checkin' %}">Check-in</a>
            <a href="{% url 'checkout' %}">Check-out</a>
            <a href="{% url 'pantalla' %}">Pantalla</a>
            <a href="{% url 'dashboard' %}">Dashboard</a>
        </nav>
    </header>

    {% block content %}{% endblock %}
</div>
</body>
</html>
